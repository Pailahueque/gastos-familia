<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splitwise Familiar</title>
    <style>
        :root {
            --primary: #1cc88a;
            --primary-dark: #17a673;
            --background: #f8f9fc;
            --text: #5a5c69;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        h1, h2 {
            text-align: center;
            color: #3a3b45;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d3e2;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--primary-dark);
        }

        .balance-list, .expense-list {
            list-style: none;
            padding: 0;
        }

        .balance-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #e3e6f0;
            font-size: 18px;
        }

        .expense-item {
            display: flex;
            justify-content: space-between;
            background: #f1f3f9;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
            font-size: 14px;
        }

        .debtor { color: #e74a3b; font-weight: bold; }
        .creditor { color: #1cc88a; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏡 Splitwise Familiar</h1>

    <div class="card">
        <h2>Saldos Globales</h2>
        <ul id="balanceList" class="balance-list">
            </ul>
    </div>

    <div class="card">
        <h2>Agregar Gasto</h2>
        <form id="expenseForm">
            <div class="form-group">
                <label for="payer">¿Quién pagó?</label>
                <select id="payer" required>
                    <option value="Mamá">Mamá</option>
                    <option value="Papá">Papá</option>
                    <option value="Hijo/a 1">Hijo/a 1</option>
                    <option value="Hijo/a 2">Hijo/a 2</option>
                </select>
            </div>
            <div class="form-group">
                <label for="amount">Monto ($)</label>
                <input type="number" id="amount" min="1" step="any" placeholder="Ej: 5000" required>
            </div>
            <div class="form-group">
                <label for="concept">Concepto</label>
                <input type="text" id="concept" placeholder="Ej: Supermercado" required>
            </div>
            <button type="submit">Repartir en partes iguales</button>
        </form>
    </div>

    <div class="card">
        <h2>Historial de Gastos</h2>
        <ul id="expenseList" class="expense-list">
            </ul>
        <button id="clearBtn" style="background-color: #e74a3b; margin-top: 10px;">Reiniciar Cuentas</button>
    </div>
</div>

<script>
    // Configuración de los miembros de la familia
    const familyMembers = ["Mamá", "Papá", "Hijo/a 1", "Hijo/a 2"];
    
    // Cargar datos guardados o iniciar vacíos
    let expenses = JSON.parse(localStorage.getItem('familyExpenses')) || [];

    const expenseForm = document.getElementById('expenseForm');
    const expenseList = document.getElementById('expenseList');
    const balanceList = document.getElementById('balanceList');
    const clearBtn = document.getElementById('clearBtn');

    // Función para calcular saldos
    function calculateBalances() {
        // Inicializar saldos en 0 para cada uno
        let balances = {};
        familyMembers.forEach(member => balances[member] = 0);

        // Calcular lo que puso cada uno y restar la parte equitativa
        expenses.forEach(exp => {
            const share = exp.amount / familyMembers.length;
            familyMembers.forEach(member => {
                if (member === exp.payer) {
                    // Le deben el dinero que pagó menos su propia parte
                    balances[member] += (exp.amount - share);
                } else {
                    // Debe su parte
                    balances[member] -= share;
                }
            });
        });

        renderBalances(balances);
    }

    // Renderizar Saldos en pantalla
    function renderBalances(balances) {
        balanceList.innerHTML = '';
        for (let member in balances) {
            const li = document.createElement('li');
            li.className = 'balance-item';
            const amount = balances[member].toFixed(2);
            
            if (amount > 0) {
                li.innerHTML = `<span>${member}</span> <span class="creditor">Le deben $${amount}</span>`;
            } else if (amount < 0) {
                li.innerHTML = `<span>${member}</span> <span class="debtor">Debe $${Math.abs(amount)}</span>`;
            } else {
                li.innerHTML = `<span>${member}</span> <span>Al día $0.00</span>`;
            }
            balanceList.appendChild(li);
        }
    }

    // Renderizar Historial de Gastos
    function renderExpenses() {
        expenseList.innerHTML = '';
        expenses.forEach(exp => {
            const li = document.createElement('li');
            li.className = 'expense-item';
            li.innerHTML = `
                <span><strong>${exp.payer}</strong> pagó $${exp.amount} por <i>${exp.concept}</i></span>
            `;
            expenseList.appendChild(li);
        });
    }

    // Guardar y Actualizar
    function updateApp() {
        localStorage.setItem('familyExpenses', JSON.stringify(expenses));
        renderExpenses();
        calculateBalances();
    }

    // Evento al agregar gasto
    expenseForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const payer = document.getElementById('payer').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const concept = document.getElementById('concept').value;

        expenses.push({ payer, amount, concept });
        updateApp();
        expenseForm.reset();
    });

    // Reiniciar aplicación
    clearBtn.addEventListener('click', () => {
        if(confirm('¿Seguro que quieres borrar todos los gastos y empezar de cero?')) {
            expenses = [];
            updateApp();
        }
    });

    // Carga inicial
    updateApp();
</script>
</body>
</html>
